function getIcon(type){
  if(type==='folder')return F;
  if(type==='tsx')return TSX;
  if(type==='ts')return TS;
  if(type==='react')return RE;
  if(type==='css')return CSS;
  if(type==='env')return ENV;
  if(type==='json')return JSON_IC;
  if(type==='cfg')return CFG;
  if(type==='md')return MD;
  if(type==='git')return GIT;
  return `<svg class="ic" viewBox="0 0 16 16"><rect x="3" y="1" width="10" height="14" rx="1.5" fill="#9d9d9d"/></svg>`;
}
function getLabelClass(type){
  if(type==='folder')return 'folder';
  if(type==='tsx'||type==='react')return 'tsx';
  if(type==='ts')return 'ts';
  if(type==='css')return 'css';
  if(type==='env')return 'env';
  if(type==='json')return 'json';
  if(type==='cfg')return 'cfg';
  if(type==='md')return 'tsx';
  return '';
}

const state={};
data.forEach(n=>{if(n.type==='folder')state[n.id]=n.open!==false});

function isVisible(node){
  if(node.depth===0)return true;
  if(!node.parent)return true;
  const par=data.find(d=>d.id===node.parent);
  if(!par)return true;
  if(!state[par.id])return false;
  return isVisible(par);
}

function render(){
  const tree=document.getElementById('tree');
  let html='';
  data.forEach(node=>{
    if(!isVisible(node))return;
    const isFolder=node.type==='folder';
    const indent=node.depth*12+4;
    const arrow=isFolder?`<span class="arrow${state[node.id]?' open':''}">▶</span>`:`<span class="arrow leaf">▶</span>`;
    const icon=isFolder?(state[node.id]?FO:F):getIcon(node.type);
    const lc=getLabelClass(node.type);
    html+=`<div class="row" data-id="${node.id}" data-folder="${isFolder}">
      <span class="indent" style="width:${indent}px"></span>
      ${arrow}
      ${icon}
      <span class="label ${lc}">${node.label}</span>
      ${node.hint?`<span class="hint">${node.hint}</span>`:''}
    </div>`;
  });
  tree.innerHTML=html;
  tree.querySelectorAll('.row').forEach(row=>{
    row.addEventListener('click',()=>{
      const id=row.dataset.id;
      const isF=row.dataset.folder==='true';
      if(isF){state[id]=!state[id];render();}
    });
  });
}
render();
</script>
